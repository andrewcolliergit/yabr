name: Build
on:
  push:
    tags:
      - "v*"
  pull_request:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv build/yabr build/yabr-${{ matrix.os }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv build/Release/yabr.exe build/Release/yabr-${{ matrix.os }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yabr-${{ matrix.os }}
          path: |
            build/yabr-${{ matrix.os }}
            build/Release/yabr-${{ matrix.os }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            yabr-ubuntu-latest/yabr-ubuntu-latest
            yabr-macos-latest/yabr-macos-latest
            yabr-windows-latest/yabr-windows-latest.exe
          fail_on_unmatched_files: false
